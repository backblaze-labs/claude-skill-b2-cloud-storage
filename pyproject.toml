[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [".cache", "node_modules"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
  "C4",  # flake8-comprehensions
  "RUF", # ruff-specific
]
ignore = [
  "E501", # line too long (Black-compatible)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
files = ["b2-cloud-storage/scripts", "tests"]
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true

# When `ty` (Astral type checker) reaches stable, swap mypy out via:
#   [tool.ty]
#   python-version = "3.10"
#   src = ["b2-cloud-storage/scripts", "tests"]
