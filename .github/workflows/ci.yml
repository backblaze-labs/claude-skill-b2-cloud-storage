name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install ruff pytest pyyaml

      - name: Lint
        run: ruff check b2-cloud-storage/scripts tests

      - name: Test
        run: pytest tests/ -v

      - name: Validate SKILL.md frontmatter
        run: python tests/validate_frontmatter.py b2-cloud-storage/SKILL.md
