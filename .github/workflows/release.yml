name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify tag matches in-tree version
        run: python scripts/check_version.py "${{ github.ref_name }}"

      - name: Build artifacts
        run: python scripts/build_artifacts.py "${{ github.ref_name }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          artifacts=(dist/*)
          if (( ${#artifacts[@]} == 0 )); then
            echo "::error::No release artifacts found in dist/"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" "${artifacts[@]}" \
            --generate-notes --title "${GITHUB_REF_NAME}"
